name: Build .deb packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.20.0)"
        required: true

jobs:
  build-deb:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            codename: noble
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-virtualenv \
            python3-dev \
            python3-venv \
            python3-pip \
            python3-setuptools \
            dpkg-dev \
            libxml2-dev \
            libxslt1-dev \
            libssl-dev \
            libffi-dev

      - name: Update debian/changelog version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          sed -i "1s/([^)]*)/($VERSION-1)/" debian/changelog

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Rename .deb with codename suffix and move into workspace
        run: |
          for deb in ../junos-ops_*.deb; do
            newname=$(basename "$deb" .deb)~${{ matrix.codename }}.deb
            mv "$deb" "${newname}"
          done

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: junos-ops-${{ matrix.codename }}
          path: junos-ops_*~${{ matrix.codename }}.deb
          retention-days: 7

      - name: Wait for GitHub Release to exist
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG... ($i/30)"
            sleep 30
          done
          echo "Release $TAG not found after 15 minutes, creating it"
          gh release create "$TAG" --generate-notes

      - name: Upload .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" junos-ops_*~${{ matrix.codename }}.deb --clobber
