name: Release to PyPI

# Fires when release-please publishes the Release after its PR is merged.
# Previously this listened to `push: tags: ['v*']`, but release-please
# creates tags via the default GITHUB_TOKEN which cannot trigger other
# workflows. Moving to `release: published` plus the PAT wired in
# release-please.yml lets the tag → Release handoff light up this
# pipeline automatically.
on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify __version__ matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('junos_ops/__init__.py').read()).group(1))")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG does not match __version__ $PKG_VERSION in junos_ops/__init__.py"
            exit 1
          fi
          echo "Verified: tag v$TAG matches __version__ $PKG_VERSION"

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # The GitHub Release itself is created by the release-please workflow
  # when its generated release PR is merged. This pipeline only needs to
  # react to the tag release-please pushes: publish to PyPI and notify
  # the homebrew tap.

  notify-homebrew:
    name: Notify Homebrew Tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew-tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api repos/shigechika/homebrew-tap/dispatches \
            -f event_type=update_junos_ops \
            -f "client_payload[version]=${{ github.ref_name }}"
