name: Build .rpm packages

# Called from release-please.yml while the release is still a DRAFT so the
# assets are attached before publishing (required for immutable releases —
# assets cannot be added after publish). workflow_dispatch remains for
# ad-hoc builds and uploads nothing.
on:
  workflow_call:
    inputs:
      tag:
        description: "Draft release tag to attach the .rpm to (e.g. v0.20.0)"
        required: true
        type: string
      sha:
        description: "Commit to build from (the draft release's target)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.20.0)"
        required: true

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: rockylinux:9
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      # Build the exact commit the draft release targets, not whatever HEAD
      # the calling run happens to sit on (empty on workflow_dispatch →
      # default checkout).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}

      - name: Install build dependencies
        run: |
          dnf install -y \
            python3.12 python3.12-devel \
            ruby ruby-devel gcc make rpm-build \
            libxml2-devel libxslt-devel openssl-devel libffi-devel \
            git-core

      - name: Install gh CLI
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh

      - name: Install fpm
        run: gem install fpm --no-document

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build virtualenv
        run: |
          python3.12 -m venv /opt/venvs/junos-ops
          /opt/venvs/junos-ops/bin/python -m ensurepip --upgrade 2>/dev/null || true
          /opt/venvs/junos-ops/bin/pip install --upgrade pip setuptools
          /opt/venvs/junos-ops/bin/pip install "${GITHUB_WORKSPACE}"
          /opt/venvs/junos-ops/bin/junos-ops --version

      - name: Prepare staging directory
        run: |
          mkdir -p staging/opt/venvs staging/usr/bin
          cp -a /opt/venvs/junos-ops staging/opt/venvs/
          ln -s /opt/venvs/junos-ops/bin/junos-ops staging/usr/bin/junos-ops

      - name: Build .rpm package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          fpm -s dir -t rpm \
            -C staging \
            -n junos-ops \
            -v "${VERSION}" \
            --iteration 1.el9 \
            --license "Apache-2.0" \
            --vendor "AIKAWA Shigechika" \
            --maintainer "AIKAWA Shigechika <shigechika@users.noreply.github.com>" \
            --url "https://github.com/shigechika/junos-ops" \
            --description "Automated JUNOS package management for Juniper Networks devices" \
            --rpm-summary "Automated JUNOS package management for Juniper Networks devices" \
            --depends python3.12 \
            --after-remove rpm/post-remove.sh \
            .

      - name: Upload .rpm as artifact
        uses: actions/upload-artifact@v7
        with:
          name: junos-ops-el9
          path: "${{ github.workspace }}/*.rpm"
          retention-days: 7
          # Without this, re-running a failed job 409s on the artifact left
          # by the previous attempt before ever reaching the release upload.
          overwrite: true

      # The release is still a draft at this point; gh resolves draft
      # releases by tag name for users with push access.
      - name: Upload .rpm to GitHub Release
        if: inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release upload "$TAG" ./*.rpm --clobber
